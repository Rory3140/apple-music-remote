name: AppleMusicRemote

options:
  bundleIdPrefix: com.rorywood
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  AppleMusicRemote:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: AppleMusicRemote
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rorywood.AppleMusicRemote
        INFOPLIST_FILE: AppleMusicRemote/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
