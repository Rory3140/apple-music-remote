<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Apple Music Remote</title>
  <link rel="icon" type="image/png" href="/assets/Apple_Music_icon.png" />
  <style>
    /* ── Reset & Base ────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:    #fc3c44;
      --bg:        #0a0a0a;
      --surface:   #1a1a1a;
      --surface2:  #222;
      --surface3:  #2c2c2e;
      --text:      #f5f5f5;
      --muted:     #888;
      --radius:    14px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── Layout ──────────────────────────────────────────────────────────────── */
    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 24px 20px env(safe-area-inset-bottom, 16px);
    }

    /* ── Status bar ──────────────────────────────────────────────────────────── */
    .status-bar {
      display: flex;
      align-items: center;
      width: 100%;
      margin-bottom: 28px;
    }

    .remotes-count {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
      flex: 1;
    }

    .remotes-count svg { opacity: 0.6; }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #555;
      transition: background 0.4s;
    }
    .status-dot.connected    { background: #30d158; }
    .status-dot.disconnected { background: #ff453a; }

    /* ── Artwork ─────────────────────────────────────────────────────────────── */
    .artwork-wrap {
      width: min(72vw, 280px);
      aspect-ratio: 1;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      margin-bottom: 28px;
      flex-shrink: 0;
      transition: transform 0.3s ease;
    }

    .artwork-wrap.playing { transform: scale(1.04); }

    .artwork-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .artwork-placeholder {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
      color: #3a3a3a;
    }

    .artwork-placeholder svg { width: 56px; height: 56px; opacity: 0.5; }

    .artwork-wrap.no-artwork img                  { display: none; }
    .artwork-wrap.no-artwork .artwork-placeholder { display: flex; }

    /* ── Track info ──────────────────────────────────────────────────────────── */
    .track-info {
      width: 100%;
      max-width: 340px;
      text-align: center;
      margin-bottom: 20px;
    }

    .track-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 15px;
      color: var(--accent);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-album {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Progress bar ────────────────────────────────────────────────────────── */
    .progress-section {
      width: 100%;
      max-width: 340px;
      margin-bottom: 24px;
    }

    .progress-track {
      width: 100%;
      height: 24px;
      cursor: pointer;
      position: relative;
      margin-bottom: 6px;
    }

    .progress-track::before {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 4px;
      transform: translateY(-50%);
      background: var(--surface2);
      border-radius: 2px;
    }

    .progress-fill {
      position: absolute;
      top: 50%; left: 0;
      height: 4px;
      transform: translateY(-50%);
      background: var(--text);
      border-radius: 2px;
      width: 0%;
      transition: width 0.5s linear;
      pointer-events: none;
    }

    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Controls ────────────────────────────────────────────────────────────── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      width: 100%;
      max-width: 340px;
      margin-bottom: 28px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      position: relative;
    }

    .ctrl-btn:active {
      opacity: 0.5;
      transform: scale(0.9);
    }

    .ctrl-btn.play-pause {
      width: 68px;
      height: 68px;
      background: var(--text);
      color: var(--bg);
      border-radius: 50%;
      box-shadow: 0 4px 20px rgba(255,255,255,0.15);
    }

    .ctrl-btn.play-pause svg { width: 28px; height: 28px; }
    .ctrl-btn.skip svg       { width: 32px; height: 32px; }

    /* Shuffle / Repeat — smaller, muted by default, accent when active */
    .ctrl-btn.secondary svg  { width: 22px; height: 22px; }
    .ctrl-btn.secondary      { color: var(--muted); padding: 6px; }
    .ctrl-btn.secondary.active { color: var(--accent); }

    /* Small dot indicator under active shuffle/repeat (like Apple Music) */
    .ctrl-btn.secondary.active::after {
      content: '';
      position: absolute;
      bottom: 1px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* ── Volume ──────────────────────────────────────────────────────────────── */
    .volume-section {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 340px;
      margin-bottom: 24px;
    }

    .volume-section svg { color: var(--muted); flex-shrink: 0; }

    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--surface2);
      cursor: pointer;
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
    }

    /* ── Up Next button ──────────────────────────────────────────────────────── */
    .up-next-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 20px;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: color 0.15s;
    }

    .up-next-btn:active { color: var(--text); }
    .up-next-btn svg    { width: 16px; height: 16px; }

    /* ── Queue bottom sheet ──────────────────────────────────────────────────── */
    .queue-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 190;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease, visibility 0s linear 0.3s;
    }

    .queue-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .queue-sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #1c1c1e;
      border-radius: 20px 20px 0 0;
      max-height: 75dvh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 200;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    .queue-sheet.open {
      transform: translateY(0);
    }

    .queue-handle-wrap {
      display: flex;
      justify-content: center;
      padding: 10px 0 4px;
      flex-shrink: 0;
    }

    .queue-handle {
      width: 36px;
      height: 4px;
      border-radius: 2px;
      background: #48484a;
    }

    .queue-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 20px 12px;
      flex-shrink: 0;
    }

    .queue-header h2 {
      font-size: 17px;
      font-weight: 700;
    }

    .queue-done-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 17px;
      font-weight: 400;
      cursor: pointer;
      padding: 4px 0;
      -webkit-tap-highlight-color: transparent;
    }

    .queue-list {
      overflow-y: auto;
      flex: 1;
      -webkit-overflow-scrolling: touch;
    }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 20px;
    }

    .queue-item + .queue-item {
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    .qi-art {
      width: 44px;
      height: 44px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface2);
    }

    .qi-info {
      flex: 1;
      min-width: 0;
    }

    .qi-title {
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .qi-artist {
      font-size: 13px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .queue-empty {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 40px 20px;
    }

    /* ── No host overlay ─────────────────────────────────────────────────────── */
    #noHostOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 100;
      padding: 32px;
      text-align: center;
    }

    #noHostOverlay.hidden { display: none; }
    #noHostOverlay svg { color: var(--accent); }

    #noHostOverlay h2 {
      font-size: 20px;
      font-weight: 700;
    }

    #noHostOverlay p {
      font-size: 14px;
      color: var(--muted);
      max-width: 260px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

<div class="page">

  <!-- Status Bar -->
  <div class="status-bar">
    <div class="remotes-count" id="remotesCount" style="visibility:hidden">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
      </svg>
      <span id="remotesText"></span>
    </div>
    <div class="connection-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting…</span>
    </div>
  </div>

  <!-- Artwork -->
  <div class="artwork-wrap no-artwork" id="artworkWrap">
    <img id="artworkImg" src="" alt="Album art" />
    <div class="artwork-placeholder">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3v10.55A4 4 0 1 0 14 17V7h4V3h-6z"/>
      </svg>
    </div>
  </div>

  <!-- Track Info -->
  <div class="track-info">
    <div class="track-title"  id="trackTitle">—</div>
    <div class="track-artist" id="trackArtist">—</div>
    <div class="track-album"  id="trackAlbum"></div>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-times">
      <span id="timeElapsed">0:00</span>
      <span id="timeDuration">0:00</span>
    </div>
  </div>

  <!-- Controls: Shuffle / Prev / Play-Pause / Next / Repeat -->
  <div class="controls">
    <button class="ctrl-btn secondary" id="btnShuffle" aria-label="Shuffle">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
      </svg>
    </button>

    <button class="ctrl-btn skip" id="btnPrev" aria-label="Previous">
      <svg viewBox="0 0 32 32" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 7h2.5v7.9L25 5.2v21.6L8.5 17.1V25H6V7z"/>
      </svg>
    </button>

    <button class="ctrl-btn play-pause" id="btnPlayPause" aria-label="Play/Pause">
      <svg id="iconPlay" viewBox="0 0 28 28" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 4l18 10L7 24V4z"/>
      </svg>
      <svg id="iconPause" viewBox="0 0 28 28" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="display:none">
        <rect x="6"  y="4" width="5" height="20" rx="2"/>
        <rect x="17" y="4" width="5" height="20" rx="2"/>
      </svg>
    </button>

    <button class="ctrl-btn skip" id="btnNext" aria-label="Next">
      <svg viewBox="0 0 32 32" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M26 7h-2.5v7.9L7 5.2v21.6l16.5-9.7V25H26V7z"/>
      </svg>
    </button>

    <button class="ctrl-btn secondary" id="btnRepeat" aria-label="Repeat">
      <!-- repeat-all icon (default) -->
      <svg id="iconRepeatAll" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/>
      </svg>
      <!-- repeat-one icon (hidden unless repeat=1) -->
      <svg id="iconRepeatOne" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="display:none">
        <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-1l-2 1v1h1.5v4H13z"/>
      </svg>
    </button>
  </div>

  <!-- Volume -->
  <div class="volume-section">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
    </svg>
    <input type="range" id="volumeSlider" min="0" max="100" value="80" aria-label="Volume" />
    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
    </svg>
  </div>

  <!-- Up Next button -->
  <button class="up-next-btn" id="btnQueue">
    <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
    </svg>
    Up Next
  </button>

</div>

<!-- Queue backdrop -->
<div class="queue-backdrop" id="queueBackdrop"></div>

<!-- Queue bottom sheet -->
<div class="queue-sheet" id="queueSheet">
  <div class="queue-handle-wrap">
    <div class="queue-handle"></div>
  </div>
  <div class="queue-header">
    <h2>Up Next</h2>
    <button class="queue-done-btn" id="queueDoneBtn">Done</button>
  </div>
  <div class="queue-list" id="queueList">
    <div class="queue-empty">Nothing queued</div>
  </div>
</div>

<!-- No Host overlay -->
<div id="noHostOverlay">
  <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
    <circle cx="12" cy="12" r="10"/>
    <line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>
  </svg>
  <h2>No host connected</h2>
  <p>Make sure Apple Music is open in Chrome with the extension enabled, and that it's connected to this relay server.</p>
</div>

<script>
(function () {
  'use strict';

  const WS_URL = window.location.origin.replace(/^http/, 'ws');

  // ── Elements ──────────────────────────────────────────────────────────────────
  const statusDot    = document.getElementById('statusDot');
  const statusText   = document.getElementById('statusText');
  const remotesCount = document.getElementById('remotesCount');
  const remotesText  = document.getElementById('remotesText');
  const artworkWrap  = document.getElementById('artworkWrap');
  const artworkImg   = document.getElementById('artworkImg');
  const trackTitle   = document.getElementById('trackTitle');
  const trackArtist  = document.getElementById('trackArtist');
  const trackAlbum   = document.getElementById('trackAlbum');
  const progressFill = document.getElementById('progressFill');
  const progressTrack= document.getElementById('progressTrack');
  const timeElapsed  = document.getElementById('timeElapsed');
  const timeDuration = document.getElementById('timeDuration');
  const btnPlayPause = document.getElementById('btnPlayPause');
  const iconPlay     = document.getElementById('iconPlay');
  const iconPause    = document.getElementById('iconPause');
  const btnPrev      = document.getElementById('btnPrev');
  const btnNext      = document.getElementById('btnNext');
  const btnShuffle   = document.getElementById('btnShuffle');
  const btnRepeat    = document.getElementById('btnRepeat');
  const iconRepeatAll= document.getElementById('iconRepeatAll');
  const iconRepeatOne= document.getElementById('iconRepeatOne');
  const volumeSlider = document.getElementById('volumeSlider');
  const noHostOverlay= document.getElementById('noHostOverlay');
  const btnQueue     = document.getElementById('btnQueue');
  const queueSheet   = document.getElementById('queueSheet');
  const queueBackdrop= document.getElementById('queueBackdrop');
  const queueDoneBtn = document.getElementById('queueDoneBtn');
  const queueList    = document.getElementById('queueList');

  // ── State ─────────────────────────────────────────────────────────────────────
  let isPlaying   = false;
  let currentTime = 0;
  let duration    = 0;
  let repeatMode  = 0;   // 0=none, 1=one, 2=all
  let shuffleMode = 0;   // 0=off, 1=on
  let ws          = null;
  let reconnectTimer = null;
  let isScrubbing = false;

  // ── WebSocket ─────────────────────────────────────────────────────────────────
  function connect() {
    if (ws) { ws.onopen = ws.onmessage = ws.onerror = ws.onclose = null; ws.close(); }
    clearTimeout(reconnectTimer);
    setConnectionStatus(false);

    try { ws = new WebSocket(WS_URL); } catch (e) {
      scheduleReconnect(); return;
    }

    ws.onopen = () => {
      setConnectionStatus(true);
      send({ type: 'register', role: 'remote' });
    };

    ws.onmessage = (event) => {
      let data;
      try { data = JSON.parse(event.data); } catch { return; }

      if (data.type === 'state')             updateUI(data);
      if (data.type === 'host_connected')    noHostOverlay.classList.add('hidden');
      if (data.type === 'host_disconnected') noHostOverlay.classList.remove('hidden');
      if (data.type === 'headcount')         updateHeadcount(data.remotes);
    };

    ws.onclose = () => { setConnectionStatus(false); scheduleReconnect(); };
    ws.onerror = () => {};
  }

  function scheduleReconnect() { reconnectTimer = setTimeout(connect, 3000); }
  function send(data) { if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(data)); }

  // ── Headcount ─────────────────────────────────────────────────────────────────
  function updateHeadcount(remotes) {
    // Show sibling count (exclude self — server count includes this remote)
    const others = Math.max(0, (remotes || 0) - 1);
    if (others > 0) {
      remotesCount.style.visibility = 'visible';
      remotesText.textContent = `+${others} other${others === 1 ? '' : 's'}`;
    } else {
      remotesCount.style.visibility = 'hidden';
    }
  }

  // ── Update UI from state ───────────────────────────────────────────────────────
  function updateUI(data) {
    isPlaying   = data.isPlaying;
    currentTime = data.currentTime || 0;
    duration    = data.duration    || 0;
    repeatMode  = typeof data.repeatMode  === 'number' ? data.repeatMode  : repeatMode;
    shuffleMode = typeof data.shuffleMode === 'number' ? data.shuffleMode : shuffleMode;

    trackTitle.textContent  = data.title  || '—';
    trackArtist.textContent = data.artist || '—';
    trackAlbum.textContent  = data.album  || '';

    if (data.artwork) {
      if (data.artwork !== artworkImg.src) artworkImg.src = data.artwork;
      artworkWrap.classList.remove('no-artwork');
    } else {
      artworkImg.src = '';
      artworkWrap.classList.add('no-artwork');
    }
    artworkWrap.classList.toggle('playing', isPlaying);

    iconPlay.style.display  = isPlaying ? 'none'  : 'block';
    iconPause.style.display = isPlaying ? 'block' : 'none';

    // Shuffle button
    btnShuffle.classList.toggle('active', shuffleMode === 1);

    // Repeat button — 0=off, 1=one, 2=all
    btnRepeat.classList.toggle('active', repeatMode !== 0);
    iconRepeatAll.style.display = repeatMode === 1 ? 'none'  : 'block';
    iconRepeatOne.style.display = repeatMode === 1 ? 'block' : 'none';

    if (!isScrubbing) {
      const pct = duration > 0 ? (currentTime / duration) * 100 : 0;
      progressFill.style.width = pct + '%';
      timeElapsed.textContent  = formatTime(currentTime);
      timeDuration.textContent = formatTime(duration);
    }

    // Queue
    if (Array.isArray(data.queue)) updateQueue(data.queue);
  }

  // ── Queue sheet ────────────────────────────────────────────────────────────────
  function updateQueue(items) {
    if (items.length === 0) {
      queueList.innerHTML = '<div class="queue-empty">Nothing queued</div>';
      return;
    }
    queueList.innerHTML = items.map(it => `
      <div class="queue-item">
        ${it.artwork
          ? `<img class="qi-art" src="${escapeAttr(it.artwork)}" alt="" />`
          : `<div class="qi-art"></div>`}
        <div class="qi-info">
          <div class="qi-title">${escapeHtml(it.title)}</div>
          <div class="qi-artist">${escapeHtml(it.artist)}</div>
        </div>
      </div>`).join('');
  }

  function openQueue() {
    queueSheet.classList.add('open');
    queueBackdrop.classList.add('open');
    queueSheet.style.transform = '';
    queueSheet.style.transition = '';
  }

  function closeQueue() {
    queueSheet.style.transition = 'transform 0.3s cubic-bezier(0.32, 0.72, 0, 1)';
    queueSheet.classList.remove('open');
    queueBackdrop.classList.remove('open');
    setTimeout(() => { queueSheet.style.transform = ''; queueSheet.style.transition = ''; }, 300);
  }

  btnQueue.addEventListener('click', openQueue);
  queueDoneBtn.addEventListener('click', closeQueue);
  queueBackdrop.addEventListener('click', closeQueue);

  // ── Queue sheet drag to dismiss ───────────────────────────────────────────────
  let dragStartY = 0;
  let dragCurrentY = 0;
  let isDraggingSheet = false;

  queueSheet.addEventListener('touchstart', (e) => {
    // Only start drag from the handle area or header (not the scrollable list)
    const target = e.target;
    const inList = queueList.contains(target);
    if (inList && queueList.scrollTop > 0) return; // let scroll work normally

    dragStartY = e.touches[0].clientY;
    dragCurrentY = dragStartY;
    isDraggingSheet = false;
  }, { passive: true });

  queueSheet.addEventListener('touchmove', (e) => {
    const y = e.touches[0].clientY;
    const deltaY = y - dragStartY;

    // Only activate drag when moving downward
    if (deltaY < 0) return;

    const inList = queueList.contains(e.target);
    if (inList && queueList.scrollTop > 0) return;

    isDraggingSheet = true;
    dragCurrentY = y;
    queueSheet.style.transition = 'none';
    queueSheet.style.transform = `translateY(${deltaY}px)`;
    queueBackdrop.style.opacity = Math.max(0, 1 - deltaY / 300);

    if (deltaY > 10) e.preventDefault();
  }, { passive: false });

  queueSheet.addEventListener('touchend', () => {
    if (!isDraggingSheet) return;
    isDraggingSheet = false;

    const deltaY = dragCurrentY - dragStartY;
    const sheetH = queueSheet.offsetHeight;

    if (deltaY > sheetH * 0.35) {
      closeQueue();
    } else {
      // Snap back
      queueSheet.style.transition = 'transform 0.3s cubic-bezier(0.32, 0.72, 0, 1)';
      queueSheet.style.transform = 'translateY(0)';
      queueBackdrop.style.opacity = '';
      setTimeout(() => { queueSheet.style.transition = ''; }, 300);
    }
  });

  // ── Controls ──────────────────────────────────────────────────────────────────
  btnPlayPause.addEventListener('click', () => sendCommand('TOGGLE_PLAY'));
  btnPrev.addEventListener('click',      () => sendCommand('PREV'));
  btnNext.addEventListener('click',      () => sendCommand('NEXT'));

  btnShuffle.addEventListener('click', () => {
    const next = shuffleMode === 0 ? 1 : 0;
    shuffleMode = next;
    btnShuffle.classList.toggle('active', next === 1);
    sendCommand('SET_SHUFFLE', { shuffleMode: next });
  });

  btnRepeat.addEventListener('click', () => {
    // Cycle: 0 (none) → 2 (all) → 1 (one) → 0
    const next = repeatMode === 0 ? 2 : (repeatMode === 2 ? 1 : 0);
    repeatMode = next;
    btnRepeat.classList.toggle('active', next !== 0);
    iconRepeatAll.style.display = next === 1 ? 'none'  : 'block';
    iconRepeatOne.style.display = next === 1 ? 'block' : 'none';
    sendCommand('SET_REPEAT', { repeatMode: next });
  });

  // ── Progress bar scrubbing ────────────────────────────────────────────────────
  let scrubSeekTimer = null;

  function getRatioFromEvent(e) {
    const rect = progressTrack.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  }

  function applyScrubbedPosition(ratio) {
    const seekTime = ratio * duration;
    progressFill.style.width = (ratio * 100) + '%';
    timeElapsed.textContent  = formatTime(seekTime);
    clearTimeout(scrubSeekTimer);
    scrubSeekTimer = setTimeout(() => sendCommand('SEEK', { seekTime }), 80);
  }

  function onScrubStart(e) {
    if (!duration) return;
    e.preventDefault();
    isScrubbing = true;
    applyScrubbedPosition(getRatioFromEvent(e));
  }

  function onScrubMove(e) {
    if (!isScrubbing) return;
    e.preventDefault();
    applyScrubbedPosition(getRatioFromEvent(e));
  }

  function onScrubEnd(e) {
    if (!isScrubbing) return;
    isScrubbing = false;
    clearTimeout(scrubSeekTimer);
    const ratio = getRatioFromEvent(e.changedTouches ? { clientX: e.changedTouches[0].clientX } : e);
    sendCommand('SEEK', { seekTime: ratio * duration });
  }

  progressTrack.addEventListener('mousedown', onScrubStart);
  document.addEventListener('mousemove', onScrubMove);
  document.addEventListener('mouseup', onScrubEnd);
  progressTrack.addEventListener('touchstart', onScrubStart, { passive: false });
  document.addEventListener('touchmove', onScrubMove, { passive: false });
  document.addEventListener('touchend', onScrubEnd);

  let volumeTimer = null;
  volumeSlider.addEventListener('input', () => {
    clearTimeout(volumeTimer);
    volumeTimer = setTimeout(() => sendCommand('SET_VOLUME', { volume: volumeSlider.value / 100 }), 120);
  });

  function sendCommand(action, extra) {
    send({ type: 'command', action, ...extra });
  }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function setConnectionStatus(connected) {
    statusDot.className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
    statusText.textContent = connected ? 'Connected' : 'Reconnecting…';
  }

  function formatTime(seconds) {
    if (!isFinite(seconds) || seconds < 0) return '0:00';
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    return m + ':' + String(s).padStart(2, '0');
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function escapeAttr(str) { return escapeHtml(str); }

  // ── Init ──────────────────────────────────────────────────────────────────────
  connect();
})();
</script>
</body>
</html>
