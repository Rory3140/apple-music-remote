<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apple Music Remote</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      padding: 16px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    header svg { flex-shrink: 0; }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 13px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }
    .dot.connected { background: #30d158; }
    .dot.disconnected { background: #ff453a; }

    .server-url {
      font-size: 11px;
      color: #888;
      word-break: break-all;
      margin-bottom: 14px;
      padding: 8px;
      background: #2a2a2a;
      border-radius: 6px;
    }

    .server-url span { color: #aaa; }

    .remote-link-section { margin-bottom: 14px; }

    .remote-link-section p {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
    }

    .copy-btn {
      width: 100%;
      padding: 8px 12px;
      background: #fc3c44;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .copy-btn:hover { opacity: 0.85; }
    .copy-btn:active { opacity: 0.7; }

    .copy-feedback {
      font-size: 11px;
      color: #30d158;
      margin-top: 5px;
      min-height: 16px;
    }

    footer {
      font-size: 10px;
      color: #555;
      text-align: center;
      margin-top: 4px;
    }
  </style>
</head>
<body>

  <header>
    <!-- Apple Music-ish music note icon -->
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="24" height="24" rx="6" fill="#fc3c44"/>
      <path d="M16 6v8.5A2.5 2.5 0 1 1 13.5 12H15V8l-5 1v7.5A2.5 2.5 0 1 1 7.5 14H9V7l7-1z" fill="white"/>
    </svg>
    <h1>Apple Music Remote</h1>
  </header>

  <div class="status-row">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Checking connection…</span>
  </div>

  <div class="server-url">
    <span>Relay server: </span><span id="serverUrl">—</span>
  </div>

  <div class="remote-link-section">
    <p>Share this link with your remote device:</p>
    <button class="copy-btn" id="copyBtn">Copy Remote URL</button>
    <div class="copy-feedback" id="copyFeedback"></div>
  </div>

  <footer>Open music.apple.com to activate</footer>

  <script src="popup.js"></script>
</body>
</html>
